name: ci

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

jobs:
  pest:
    name: Pest — PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4"]
        laravel: ["12.*", "13.*"]
        # 8.3 is the floor (Pest 4 + PHPUnit 12 require it; PHPUnit 12's
        # GarbageCollectorStatus crashes on PHP 8.2). 8.4 is the ceiling
        # so we catch upcoming breaks early. Laravel ^11 was dropped
        # from the matrix on 2026-06-11: every v11.x release on packagist
        # is flagged with security advisories (PKSA-mdq4-51ck-6kdq and
        # 4 others), so composer refuses to install any v11.* version
        # without an `policy.advisories.ignore-id` opt-in. ^11 is still
        # declared in `composer.json` for self-hosting users who accept
        # the trade-off, but the CI lane has no path to a green run
        # against L11 today. ^12 is current, ^13 is supported since
        # v1.3.0.

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ matrix.laravel }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-${{ matrix.laravel }}-

      - name: Pin Laravel ${{ matrix.laravel }}
        run: |
          # orchestra/testbench tracks Laravel's major:
          #   L12 → testbench ^10
          #   L13 → testbench ^11
          case "${{ matrix.laravel }}" in
            12.*) TB="^10" ;;
            13.*) TB="^11" ;;
            *)    echo "Unknown Laravel matrix value: ${{ matrix.laravel }}" >&2; exit 1 ;;
          esac
          # L13 needs pest-plugin-laravel ^4 (^3 caps at L12).
          if [[ "${{ matrix.laravel }}" == 13.* ]]; then
            composer require --no-update --dev \
              "laravel/framework:${{ matrix.laravel }}" \
              "orchestra/testbench:${TB}" \
              "pestphp/pest:^4.0" \
              "pestphp/pest-plugin-laravel:^4.0"
          else
            composer require --no-update --dev \
              "laravel/framework:${{ matrix.laravel }}" \
              "orchestra/testbench:${TB}"
          fi

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Run Pest
        run: vendor/bin/pest --no-coverage

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-phpstan-${{ hashFiles('composer.json') }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=2G

  pint:
    name: Pint (style)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Check style with Pint
        run: vendor/bin/pint --test

  vitest:
    name: Vitest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test
