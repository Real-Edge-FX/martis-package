name: Release

# Create/update a GitHub Release whose notes come from the matching
# CHANGELOG.md section. DISPATCH-ONLY fallback/backfill tool.
#
# The primary release path is manual, from the workstation:
#   gh release create vX.Y.Z --target <merge-commit-sha> --notes-file <notes>
# which creates the tag + Release in one shot. This workflow is NOT wired to
# `on: push: tags` on purpose — doing so made it re-fire on every gh-created
# tag and fail (it looked for a CHANGELOG section that the tagged merge commit
# did not yet carry). Run it by hand only when you need to (re)publish a
# Release for a tag without the workstation gh.
#
# ABOUT THE "Verified" BADGE: it comes from the TAGGED COMMIT being signed,
# NOT from this workflow or the API. GitHub signs merge commits made through
# the web UI, so tagging a web-merge commit yields a Verified tag (that is how
# v1.16.x+ got the badge). This workflow does not touch signing.
#
# One-time prerequisite: Settings -> Actions -> General -> Workflow
# permissions -> "Read and write permissions".

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version WITHOUT the v prefix (e.g. 1.17.2). Needs a matching "## [x]" section in CHANGELOG.md.'
        required: true
      sha:
        description: 'Commit SHA to tag (only used when the tag does not exist yet). Empty = current main HEAD.'
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag / version
        id: r
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v${{ inputs.version }}"
          fi
          echo "tag=$TAG"      >> "$GITHUB_OUTPUT"
          echo "ver=${TAG#v}"  >> "$GITHUB_OUTPUT"

      - name: Ensure the tag exists (dispatch/backfill only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.r.outputs.tag }}"; REPO="${{ github.repository }}"
          if ! gh api "repos/$REPO/git/refs/tags/$TAG" >/dev/null 2>&1; then
            SHA="${{ inputs.sha }}"; [ -z "$SHA" ] && SHA="$(git rev-parse HEAD)"
            gh api -X POST "repos/$REPO/git/refs" -f ref="refs/tags/$TAG" -f sha="$SHA"
            echo "Created tag $TAG at $SHA"
          fi

      - name: Extract CHANGELOG notes
        run: |
          set -euo pipefail
          awk -v v="${{ steps.r.outputs.ver }}" '
            $0 ~ "^## \\[" v "\\]" { f=1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > NOTES.md
          if [ ! -s NOTES.md ]; then
            echo "::error::No CHANGELOG.md section for [${{ steps.r.outputs.ver }}]"
            exit 1
          fi
          echo "----- notes -----"; cat NOTES.md

      - name: Create or update the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.r.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file NOTES.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file NOTES.md --verify-tag
          fi
