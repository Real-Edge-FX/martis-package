name: Release

# Standard Martis release: create a GitHub-SIGNED (Verified) annotated tag
# and a GitHub Release whose notes come from CHANGELOG.md.
#
# Why: manual `git tag && git push` produces UNSIGNED tags (no "Verified")
# and NO Release/notes — v1.17.0/v1.17.1 hit exactly that. Tag objects
# created through the GitHub API with the Actions token are signed by
# GitHub (Verified), and notes come from the matching CHANGELOG section.
#
# Two ways to run:
#   - Push a `v*` tag (e.g. from git) → this recreates it SIGNED + publishes
#     the Release. (The API-recreated tag is pushed by the Actions token, so
#     it does NOT re-trigger this workflow — no loop.)
#   - Actions → Release → Run workflow → version = 1.17.2 (backfill an old
#     one by also passing its commit `sha`).
#
# One-time prerequisite: Settings → Actions → General → Workflow permissions
# → "Read and write permissions".

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version WITHOUT the v prefix (e.g. 1.17.2). Needs a matching "## [x]" section in CHANGELOG.md.'
        required: true
      sha:
        description: 'Commit SHA to tag. Empty = current main HEAD (use it to backfill an old release).'
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag / version / commit
        id: r
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"; VER="${TAG#v}"; SHA="${GITHUB_SHA}"
          else
            VER="${{ inputs.version }}"; TAG="v${VER}"
            SHA="${{ inputs.sha }}"; [ -z "$SHA" ] && SHA="$(git rev-parse HEAD)"
          fi
          echo "ver=$VER"  >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"  >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"  >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG at $SHA"

      - name: Extract CHANGELOG notes
        run: |
          set -euo pipefail
          awk -v v="${{ steps.r.outputs.ver }}" '
            $0 ~ "^## \\[" v "\\]" { f=1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > NOTES.md
          if [ ! -s NOTES.md ]; then
            echo "::error::No CHANGELOG.md section for [${{ steps.r.outputs.ver }}]"
            exit 1
          fi
          echo "----- notes -----"; cat NOTES.md

      - name: Recreate tag as a Verified (GitHub-signed) annotated tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.r.outputs.tag }}"; SHA="${{ steps.r.outputs.sha }}"; REPO="${{ github.repository }}"
          gh api -X DELETE "repos/$REPO/git/refs/tags/$TAG" 2>/dev/null || true
          OBJ="$(gh api -X POST "repos/$REPO/git/tags" \
                  -f tag="$TAG" -f message="$TAG" -f object="$SHA" -f type=commit --jq .sha)"
          gh api -X POST "repos/$REPO/git/refs" -f ref="refs/tags/$TAG" -f sha="$OBJ"
          echo "Signed tag $TAG -> $OBJ"

      - name: Create or update the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.r.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file NOTES.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file NOTES.md --verify-tag
          fi
